version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mcp-gateway-lite-postgres
    environment:
      POSTGRES_DB: mcp_gateway_lite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mcp_gateway_lite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_gateway_lite"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-gateway-lite
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mcp_gateway_lite
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: ["/bin/sh", "-c", "node dist/index.js"]

volumes:
  mcp_gateway_lite_postgres_data:
